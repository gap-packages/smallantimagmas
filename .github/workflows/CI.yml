---
name: CI
run-name: CI-${{ github.event.number }} ${{ github.event.pull_request.title }}

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main

# the `concurrency` settings ensure that not too many CI jobs run in parallel
concurrency:
  # group by workflow and ref; the last slightly strange component ensures that for pull
  # requests, we limit to 1 concurrent job, but for the master branch we don't
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/master' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  gaptest:
    name: Code quality - unit-tests (${{ matrix.gap-branch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gap-branch:
          - master
          - stable-4.15
          - stable-4.14
          - stable-4.13
          - stable-4.12

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup gap-system
        uses: gap-actions/setup-gap@2a5e919b2684ba9f268f14bf8f567e4f2c4020a8 # v3
        with:
          gap-version: ${{ matrix.gap-branch }}

      - name: Install additional packages
        shell: bash
        run: |
          gap -c 'LoadPackage("PackageManager"); InstallPackage("digraphs"); QUIT;'

      - name: Build gap-package
        uses: gap-actions/build-pkg@ea5a215744d2952bc0528321c4ec14b3c4946b5d # v3

      - name: Provision documentation for package
        uses: gap-actions/build-pkg-docs@ee3f0345faaa15e9c0173f8f2aec61e65483168f # v2
        with:
          use-latex: 'true'

      - name: Run gap-tests
        uses: gap-actions/run-pkg-tests@142daa59ba8d2b2893339e40935ab394a2bda1e3 # v4

      - name: Run gap-tests (only-needed)
        uses: gap-actions/run-pkg-tests@142daa59ba8d2b2893339e40935ab394a2bda1e3 # v4
        with:
          only-needed: true

      - name: Show code-coverage
        uses: gap-actions/process-coverage@500e7ca58e508de2b0dce5d1738f5fd0980bed0a # v3

  gaplint:
    name: Code quality - gaplint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: 3.13
          cache: pip

      - name: Install python-dependencies
        uses: py-actions/py-dependency-install@30aa0023464ed4b5b116bd9fbdab87acf01a484e # v4
        with:
          update-pip: true

      - name: Run gaplint
        run: |
          echo "::group:: gaplint -- *.g"
          find . -name '*.g' | xargs -n1 gaplint
          echo "::group:: gaplint -- *.gi"
          find . -name '*.gi' | xargs -n1 gaplint
          echo "::group:: gaplint -- *.gd"
          find . -name '*.gd' | xargs -n1 gaplint
          echo "::group:: gaplint -- *.tst"
          find . -name '*.tst' | xargs -n1 gaplint
